name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run API tests
        id: pytest
        continue-on-error: true
        run: |
          set +e
          python -m pytest tests/ --ignore=tests/test_e2e.py --ignore=tests/test_login_e2e.py \
            --ignore=tests/test_users_e2e.py --ignore=tests/test_api_pw.py -v \
            --json-report --json-report-file=report.json
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Write job summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib
          p = pathlib.Path("report.json")
          if not p.exists():
            with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("## ❌ API Test Report\n\nTest run crashed before producing a report — check the logs.\n")
            raise SystemExit(0)
          r = json.loads(p.read_text())
          s = r["summary"]
          passed = s.get("passed", 0)
          failed = s.get("failed", 0)
          error  = s.get("error", 0)
          total  = s.get("total", 0)
          duration = r.get("duration", 0)
          icon   = "✅" if failed == 0 and error == 0 else "❌"
          lines  = [
            f"## {icon} API Test Report",
            "| Result | Count |",
            "|--------|-------|",
            f"| ✅ Passed | {passed} |",
            f"| ❌ Failed | {failed} |",
            f"| 💥 Error  | {error}  |",
            f"| **Total** | **{total}** |",
            f"| ⏱ Duration | {duration:.2f}s |",
            "",
            "### Test Results",
            "| Test | Result | Duration |",
            "|------|--------|----------|",
          ]
          for t in r.get("tests", []):
            name = t["nodeid"].split("::")[-1]
            outcome = t["outcome"]
            dur = (t.get("call") or {}).get("duration", 0)
            if outcome == "passed":
              badge = "✅ passed"
            elif outcome == "failed":
              badge = "❌ failed"
            else:
              badge = "💥 error"
            lines.append(f"| `{name}` | {badge} | {dur:.3f}s |")
          lines.append("")
          for t in r.get("tests", []):
            if t["outcome"] in ("failed", "error"):
              name = t["nodeid"].split("::")[-1]
              msg  = (t.get("call") or t.get("setup") or {}).get("longrepr", "")
              lines.append(f"<details><summary>❌ <code>{name}</code> — failure detail</summary>\n\n```\n{msg}\n```\n</details>")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write("\n".join(lines))
          EOF

      - name: Propagate exit code
        if: always()
        run: exit ${{ steps.pytest.outputs.exit_code }}

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E on push to main (after Vercel deploys)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: api-tests

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: python -m pytest tests/test_e2e.py --base-url=${{ secrets.VERCEL_PRODUCTION_URL }} -v
        # E2E failures are non-blocking — remove 'continue-on-error' to make them blocking
        continue-on-error: true
