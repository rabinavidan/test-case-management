name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run API tests
        id: pytest
        run: |
          python -m pytest tests/ --ignore=tests/test_e2e.py -v \
            --json-report --json-report-file=report.json; \
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Write job summary
        if: always()
        run: |
          python - <<'EOF'
          import json, os, pathlib
          r = json.loads(pathlib.Path("report.json").read_text())
          s = r["summary"]
          passed = s.get("passed", 0)
          failed = s.get("failed", 0)
          error  = s.get("error", 0)
          total  = s.get("total", 0)
          icon   = "✅" if failed == 0 and error == 0 else "❌"
          lines  = [
            f"## {icon} API Test Report",
            "| Result | Count |",
            "|--------|-------|",
            f"| ✅ Passed | {passed} |",
            f"| ❌ Failed | {failed} |",
            f"| 💥 Error  | {error}  |",
            f"| **Total** | **{total}** |",
            "",
          ]
          if failed or error:
            lines.append("### Failures")
            for t in r.get("tests", []):
              if t["outcome"] in ("failed", "error"):
                name = t["nodeid"].split("::")[-1]
                msg  = (t.get("call") or t.get("setup") or {}).get("longrepr", "")
                lines.append(f"<details><summary><code>{name}</code></summary>\n\n```\n{msg}\n```\n</details>")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write("\n".join(lines))
          EOF

      - name: Propagate exit code
        if: always()
        run: exit ${{ steps.pytest.outputs.exit_code }}

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # Only run E2E on push to main (after Vercel deploys)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: api-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
        run: python -m pytest tests/test_e2e.py --base-url=${{ secrets.VERCEL_PRODUCTION_URL }} -v
        # E2E failures are non-blocking — remove 'continue-on-error' to make them blocking
        continue-on-error: true
