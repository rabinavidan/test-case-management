name: Playwright TypeScript E2E

on:
  push:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'api/**'
      - 'static/**'
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC against the production Vercel deployment
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL (leave blank to use VERCEL_PRODUCTION_URL secret or localhost)'
        required: false
        default: ''

jobs:
  e2e:
    name: E2E Tests (Playwright TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Resolve target URL
        id: url
        run: |
          # Priority: workflow_dispatch input > VERCEL_PRODUCTION_URL secret > localhost (for push/PR)
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "target=${{ inputs.base_url }}" >> $GITHUB_OUTPUT
            echo "local=false" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.VERCEL_PRODUCTION_URL }}" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "target=${{ secrets.VERCEL_PRODUCTION_URL }}" >> $GITHUB_OUTPUT
            echo "local=false" >> $GITHUB_OUTPUT
          else
            echo "target=http://localhost:8000" >> $GITHUB_OUTPUT
            echo "local=true" >> $GITHUB_OUTPUT
          fi

      - name: Start app (local runs only)
        if: steps.url.outputs.local == 'true'
        working-directory: .
        run: |
          pip install -r requirements.txt
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run Playwright tests
        id: pw
        run: npx playwright test; echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
        env:
          BASE_URL: ${{ steps.url.outputs.target }}
          CI: true

      - name: Write job summary
        if: always()
        working-directory: e2e
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const summaryFile = process.env.GITHUB_STEP_SUMMARY;
          const jsonPath = path.join('test-results', 'results.json');

          if (!fs.existsSync(jsonPath)) {
            fs.appendFileSync(summaryFile, '## ❌ Playwright Report\n\nTest run crashed before producing a report — check the logs.\n');
            process.exit(0);
          }

          const r = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));

          let passed = 0, failed = 0, skipped = 0, flaky = 0, duration = 0;
          const failures = [];

          for (const suite of r.suites || []) {
            for (const spec of (suite.specs || [])) {
              for (const test of (spec.tests || [])) {
                const status = test.status;
                const ms = (test.results || []).reduce((a, x) => a + (x.duration || 0), 0);
                duration += ms;
                if (status === 'expected') passed++;
                else if (status === 'unexpected') {
                  failed++;
                  const lastResult = (test.results || []).slice(-1)[0] || {};
                  failures.push({ title: spec.title, file: suite.file || suite.title, error: lastResult.error?.message || '' });
                } else if (status === 'skipped') skipped++;
                else if (status === 'flaky') { flaky++; passed++; }
              }
            }
          }

          const total = passed + failed + skipped;
          const icon = failed === 0 ? '✅' : '❌';
          const dur = (duration / 1000).toFixed(1);

          const lines = [
            `## ${icon} Playwright E2E Report`,
            `| Result | Count |`,
            `|--------|-------|`,
            `| ✅ Passed | ${passed} |`,
            `| ❌ Failed | ${failed} |`,
            `| ⏭ Skipped | ${skipped} |`,
            `| 🔁 Flaky  | ${flaky} |`,
            `| **Total** | **${total}** |`,
            `| ⏱ Duration | ${dur}s |`,
            '',
          ];

          if (failures.length > 0) {
            lines.push('### Failed Tests');
            for (const f of failures) {
              const errSnippet = f.error ? f.error.split('\n').slice(0, 6).join('\n') : 'No error message';
              lines.push(`<details><summary>❌ <code>${f.title}</code> — ${f.file}</summary>\n\n\`\`\`\n${errSnippet}\n\`\`\`\n</details>`);
            }
            lines.push('');
          }

          fs.appendFileSync(summaryFile, lines.join('\n'));
          EOF

      - name: Propagate exit code
        if: always()
        run: exit ${{ steps.pw.outputs.exit_code }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/results.json
          retention-days: 7
