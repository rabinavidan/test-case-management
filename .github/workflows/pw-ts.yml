name: Playwright TypeScript E2E

on:
  push:
    branches: [main]
    paths:
      - 'e2e/**'
      - 'api/**'
      - 'static/**'
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 06:00 UTC against the production Vercel deployment
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL (leave blank to use VERCEL_PRODUCTION_URL secret or localhost)'
        required: false
        default: ''

jobs:
  e2e:
    name: E2E Tests (Playwright TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Resolve target URL
        id: url
        run: |
          # Priority: workflow_dispatch input > VERCEL_PRODUCTION_URL secret > localhost (for push/PR)
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "target=${{ inputs.base_url }}" >> $GITHUB_OUTPUT
            echo "local=false" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.VERCEL_PRODUCTION_URL }}" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "target=${{ secrets.VERCEL_PRODUCTION_URL }}" >> $GITHUB_OUTPUT
            echo "local=false" >> $GITHUB_OUTPUT
          else
            echo "target=http://localhost:8000" >> $GITHUB_OUTPUT
            echo "local=true" >> $GITHUB_OUTPUT
          fi

      - name: Start app (local runs only)
        if: steps.url.outputs.local == 'true'
        working-directory: .
        run: |
          pip install -r requirements.txt
          uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          sleep 3

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.url.outputs.target }}
          CI: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
