[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
# Default base URL for E2E tests — override with --base-url=... on the CLI
base_url = https://test-case-management-75k1oinzx-rabinavidans-projects.vercel.app
markers =
    regression: marks tests as part of the regression suite (Playwright E2E)
# Stream pw.* logs live during test runs (shows step/action/assert/failure details)
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s  %(levelname)-7s  %(name)s  %(message)s
log_cli_date_format = %H:%M:%S
