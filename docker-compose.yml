services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://testflow:testflow@db:5432/testflow
      JWT_SECRET_KEY: change-me-in-production
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: testflow
      POSTGRES_PASSWORD: testflow
      POSTGRES_DB: testflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
