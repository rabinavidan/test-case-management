<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TestFlow — Test Case Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              200: '#bfdbfe',
              300: '#93c5fd',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none; }
    .fade-in { animation: fadeIn .18s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .modal-backdrop { backdrop-filter: blur(2px); }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

<!-- ─── Auth modal (shown on Sign In click) ───────────────────────────────── -->
<div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
  <div id="auth-form-container" class="w-full max-w-sm"></div>
</div>

<!-- ─── App shell (always visible) ───────────────────────────────────────── -->
<div id="app-shell" class="flex flex-col min-h-screen">

<!-- Top nav -->
<header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-30">
  <div class="max-w-screen-xl mx-auto px-4 flex items-center h-14 gap-3">
    <button data-testid="logo-btn" onclick="navigate('projects')" class="flex items-center gap-2 font-bold text-brand-700 text-lg hover:text-brand-600 transition-colors">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      TestFlow
    </button>
    <div id="breadcrumb" data-testid="breadcrumb" class="flex items-center gap-1 text-sm text-slate-500 ml-2"></div>
    <div class="ml-auto flex items-center gap-2">
      <button id="nav-new-btn" data-testid="nav-new-btn" onclick="handleNewBtn()" class="hidden bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-2.5 py-1.5 rounded-lg transition-colors flex items-center gap-1">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        <span id="nav-new-label" data-testid="nav-new-label" class="hidden sm:inline">New</span>
      </button>
      <div id="user-badge" data-testid="user-badge" class="flex-shrink-0">
        <button onclick="showAuthModal('login')" data-testid="signin-btn"
          class="bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap">
          Sign in
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Main layout -->
<div class="flex flex-1 max-w-screen-xl mx-auto w-full px-4 py-6 gap-6">

  <!-- Sidebar -->
  <aside class="w-56 flex-shrink-0 hidden md:block">
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="px-4 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Projects</span>
        <button onclick="isAdmin() ? showModal('project') : null" class="text-brand-600 hover:text-brand-700 transition-colors" title="New project" id="sidebar-new-project-btn" style="display:none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        </button>
      </div>
      <ul id="sidebar-projects" data-testid="sidebar-projects" class="divide-y divide-slate-100 max-h-[calc(100vh-12rem)] overflow-y-auto">
        <li class="px-4 py-3 text-sm text-slate-400 italic">Loading…</li>
      </ul>
    </div>
  </aside>

  <!-- Content -->
  <main id="main-content" class="flex-1 min-w-0">
    <div id="view-projects" class="view fade-in"></div>
    <div id="view-project"  class="view fade-in hidden"></div>
    <div id="view-suite"    class="view fade-in hidden"></div>
    <div id="view-run"      class="view fade-in hidden"></div>
    <div id="view-users"    class="view fade-in hidden"></div>
  </main>
</div>

  <footer class="border-t border-slate-200 bg-white py-3 mt-auto">
    <div class="max-w-screen-xl mx-auto px-4 flex items-center justify-between text-xs text-slate-400">
      <span>TestFlow</span>
      <span id="app-version">v2.0.0</span>
    </div>
  </footer>
</div><!-- end #app-shell -->

<!-- ─── Modals ─────────────────────────────────────────────────────────────── -->
<div id="modal-overlay" data-testid="modal-overlay" class="fixed inset-0 bg-slate-900/50 modal-backdrop z-50 hidden flex items-center justify-center p-4" onclick="closeModal(event)">
  <div id="modal-box" data-testid="modal-box" class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
      <h2 id="modal-title" data-testid="modal-title" class="text-lg font-semibold text-slate-800"></h2>
      <button data-testid="modal-close-btn" onclick="hideModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="modal-body" data-testid="modal-body" class="px-6 py-5"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
  <div id="toast-inner" data-testid="toast-inner" class="px-4 py-3 rounded-xl shadow-lg text-sm font-medium flex items-center gap-2 max-w-xs"></div>
</div>

<script src="/static/app.js?v=35"></script>
</body>
</html>
